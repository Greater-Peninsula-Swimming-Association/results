name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Build season archives
        run: |
          for CSV in $(find . -maxdepth 2 -name "divisions.csv" | sort); do
            YEAR_DIR=$(dirname "$CSV")
            YEAR=$(basename "$YEAR_DIR")

            HTML_COUNT=$(find "$YEAR_DIR" -maxdepth 1 -name "*.html" | wc -l)
            if [ "$HTML_COUNT" -eq 0 ]; then
              echo "Skipping $YEAR — no result files yet"
              continue
            fi

            echo "Building archive for $YEAR ($HTML_COUNT results)..."
            python scripts/build_archive.py \
              -i "$YEAR_DIR" \
              -o "$YEAR_DIR" \
              --non-interactive \
              --verbose
          done

      - name: Generate directory indexes
        run: python scripts/generate_index.py .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
